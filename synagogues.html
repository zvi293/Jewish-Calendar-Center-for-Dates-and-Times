<!doctype html>
<html lang="he" dir="rtl" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>בתי כנסת ומקוואות באזור | הלוח היהודי</title>
    <meta
      name="description"
      content="מצא בתי כנסת ומקוואות באזור שלך לפי מיקום, ראה מרחק ונווט בלחיצה."
    />
    <meta name="theme-color" content="#0f172a" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://jewishcalendar.netlify.app/synagogues.html" />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />

    <link rel="preconnect" href="https://overpass-api.de" crossorigin />
    <link rel="preconnect" href="https://z.overpass-api.de" crossorigin />
    <link rel="preconnect" href="https://overpass.kumi.systems" crossorigin />
    <link rel="preconnect" href="https://nominatim.openstreetmap.org" crossorigin />
    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class", theme: { extend: {} } };
    </script>

    <link
      href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-grad-1: #0b1220;
        --bg-grad-2: #0f172a;
        --bg-grad-3: #1e293b;
      }
      html, body {
        font-family: 'Assistant', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 50%, #0b1220 100%);
        color: #f1f5f9;
        min-height: 100vh;
      }
      body {
        background-attachment: fixed;
      }
      .card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 1rem;
        transition: all 0.25s ease;
      }
      .card:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.18);
        transform: translateY(-1px);
      }
      .tab-btn {
        position: relative;
        padding: 0.85rem 1.25rem;
        border-radius: 1rem;
        font-weight: 700;
        font-size: 1rem;
        transition: all 0.25s ease;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.05);
        color: rgba(241, 245, 249, 0.80);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        cursor: pointer;
      }
      .tab-btn:hover {
        background: rgba(255, 255, 255, 0.10);
        color: #fff;
      }
      .tab-btn.active {
        background: linear-gradient(135deg, rgba(16,185,129,0.35), rgba(20,184,166,0.35), rgba(34,211,238,0.35));
        border-color: rgba(94, 234, 212, 0.60);
        color: #fff;
        box-shadow: 0 4px 24px rgba(20, 184, 166, 0.30);
      }
      .tab-btn.active.mikvah {
        background: linear-gradient(135deg, rgba(59,130,246,0.35), rgba(99,102,241,0.35), rgba(139,92,246,0.35));
        border-color: rgba(167, 139, 250, 0.60);
        box-shadow: 0 4px 24px rgba(99, 102, 241, 0.30);
      }
      .tab-btn.active.tzaddik {
        background: linear-gradient(135deg, rgba(251,191,36,0.35), rgba(245,158,11,0.35), rgba(217,119,6,0.35));
        border-color: rgba(252, 211, 77, 0.60);
        box-shadow: 0 4px 24px rgba(245, 158, 11, 0.30);
      }
      .nav-btn {
        background: linear-gradient(135deg, #06b6d4, #0891b2);
        color: #fff;
        font-weight: 700;
        padding: 0.55rem 1rem;
        border-radius: 0.75rem;
        font-size: 0.9rem;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        transition: all 0.2s ease;
        border: none;
        cursor: pointer;
        white-space: nowrap;
      }
      .nav-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(6, 182, 212, 0.40);
        filter: brightness(1.05);
      }
      .nav-btn:active {
        transform: translateY(0);
      }
      .spinner {
        width: 42px;
        height: 42px;
        border: 3px solid rgba(94, 234, 212, 0.20);
        border-top-color: #5eead4;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      .spinner-small {
        width: 12px;
        height: 12px;
        border: 2px solid rgba(94, 234, 212, 0.20);
        border-top-color: #5eead4;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        display: inline-block;
        flex-shrink: 0;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .radius-chip {
        padding: 0.4rem 0.85rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(241, 245, 249, 0.85);
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .radius-chip:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .radius-chip.active {
        background: linear-gradient(135deg, rgba(16,185,129,0.40), rgba(20,184,166,0.40));
        border-color: rgba(94, 234, 212, 0.60);
        color: #fff;
      }
      .top-nav {
        background: rgba(15, 23, 42, 0.75);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.5rem 0.9rem;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 0.75rem;
        color: #fff;
        font-weight: 600;
        font-size: 0.9rem;
        transition: all 0.2s ease;
        text-decoration: none;
      }
      .back-btn:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      .item-name {
        font-weight: 700;
        font-size: 1.05rem;
        color: #f1f5f9;
        line-height: 1.3;
      }
      .item-distance {
        font-size: 0.85rem;
        color: rgba(148, 163, 184, 1);
        margin-top: 0.25rem;
      }
      .item-address {
        font-size: 0.8rem;
        color: rgba(148, 163, 184, 0.85);
        margin-top: 0.15rem;
      }
      .gradient-title {
        background: linear-gradient(135deg, #5eead4, #22d3ee, #93c5fd);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .gradient-title.mikvah {
        background: linear-gradient(135deg, #93c5fd, #a78bfa, #c4b5fd);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .gradient-title.tzaddik {
        background: linear-gradient(135deg, #fcd34d, #fbbf24, #f59e0b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .btn-action {
        padding: 0.6rem 1.1rem;
        border-radius: 0.75rem;
        font-weight: 600;
        font-size: 0.9rem;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #f1f5f9;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .btn-action:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      .btn-action.primary {
        background: linear-gradient(135deg, #10b981, #14b8a6);
        border-color: transparent;
        color: #fff;
      }
      .btn-action.primary:hover {
        filter: brightness(1.08);
        box-shadow: 0 4px 16px rgba(20, 184, 166, 0.40);
      }
      details summary {
        cursor: pointer;
        list-style: none;
      }
      details summary::-webkit-details-marker { display: none; }
      .fade-in {
        animation: fadeIn 0.4s ease forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>

  <body class="min-h-screen pb-24">
    <!-- ══════ Top Nav ══════ -->
    <header class="top-nav sticky top-0 z-40 px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="back-btn" aria-label="חזרה לדף הראשי">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18l6-6-6-6"></path>
        </svg>
        <span>חזרה</span>
      </a>
      <h1 class="text-base font-bold text-white/90">בתי כנסת ומקוואות באזור</h1>
      <div class="w-[78px]"></div>
    </header>

    <main class="max-w-3xl mx-auto px-4 pt-6">
      <!-- ══════ Title ══════ -->
      <div class="text-center mb-6">
        <h2 id="page-title" class="text-3xl md:text-4xl font-extrabold gradient-title mb-2">
          בתי כנסת באזורך
        </h2>
        <p id="page-subtitle" class="text-slate-300/80 text-sm">
          מצא את המקומות הקרובים אליך ונווט אליהם בלחיצה
        </p>
      </div>

      <!-- ══════ Tabs ══════ -->
      <div class="flex gap-2 justify-center flex-wrap mb-6">
        <button id="tab-shul" class="tab-btn active" onclick="switchTab('shul')">
          <span aria-hidden="true">🕍</span>
          <span>בתי כנסת</span>
        </button>
        <button id="tab-mikvah" class="tab-btn" onclick="switchTab('mikvah')">
          <span aria-hidden="true">💧</span>
          <span>מקוואות</span>
        </button>
        <button id="tab-tzaddik" class="tab-btn" onclick="switchTab('tzaddik')">
          <span aria-hidden="true">🕯️</span>
          <span>ציוני צדיקים</span>
        </button>
      </div>

      <!-- ══════ Controls Card ══════ -->
      <div class="card p-4 mb-5">
        <!-- Location row -->
        <div class="flex items-center justify-between flex-wrap gap-3 mb-4">
          <div class="flex items-center gap-2 text-sm">
            <svg class="w-4 h-4 text-emerald-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <span id="location-status" class="text-slate-300/90">בודק מיקום…</span>
          </div>
          <button id="btn-refresh-loc" class="btn-action" onclick="refreshLocation()" type="button">
            עדכן מיקום
          </button>
        </div>

        <!-- Radius row -->
        <div>
          <div class="text-xs text-slate-400 mb-2">רדיוס חיפוש:</div>
          <div class="flex flex-wrap gap-2" id="radius-chips">
            <button class="radius-chip" data-r="1" type="button">1 ק"מ</button>
            <button class="radius-chip" data-r="3" type="button">3 ק"מ</button>
            <button class="radius-chip" data-r="5" type="button">5 ק"מ</button>
            <button class="radius-chip active" data-r="10" type="button">10 ק"מ</button>
            <button class="radius-chip" data-r="20" type="button">20 ק"מ</button>
            <button class="radius-chip" data-r="50" type="button">50 ק"מ</button>
            <button class="radius-chip" data-r="100" type="button">100 ק"מ</button>
          </div>
        </div>
      </div>

      <!-- ══════ Status / Results ══════ -->
      <div id="status-area" class="flex flex-col items-center justify-center py-12 text-center">
        <div class="spinner mb-4"></div>
        <div class="text-slate-300/90 text-sm" id="status-text">מאתר מיקום…</div>
      </div>

      <div id="results" class="space-y-3"></div>

      <!-- ══════ Footer info ══════ -->
      <div class="mt-10 text-center text-xs text-slate-500">
        <p>הנתונים מבוססים על OpenStreetMap. אם פספסנו מקום או נתקלת בשגיאה — אפשר לעדכן אותו דרך
          openstreetmap.org.</p>
      </div>
    </main>

    <script>
      // ══════════════════════════════════════════════════
      //  SYNAGOGUES & MIKVAHS — Location-based finder
      //  Data: OpenStreetMap (Overpass API)
      //  Navigation: Waze
      // ══════════════════════════════════════════════════

      const LS_LOC_KEY = "shulMikve_lastLocation_v1";
      const LS_LOC_TTL_MS = 1000 * 60 * 60 * 24 * 7; // 7 days
      const LS_PERMISSION_KEY = "shulMikve_locPermissionGranted";
      const LS_RADIUS_KEY = "shulMikve_lastRadius";
      const LS_TAB_KEY = "shulMikve_lastTab";

      // Overpass API endpoints — raced in parallel via Promise.any so the
      // fastest valid response wins. Endpoint reliability (tested empirically
      // from Israel):
      //  - overpass-api.de:   main server, fast when not overloaded
      //  - z.overpass-api.de: official alternate, very reliable
      //  - kumi.systems:      EU mirror, slower but solid
      // Excluded: overpass.osm.ch (returns stale empty data), private.coffee
      // (no response from IL), openstreetmap.ru (geo-blocked from IL).
      const OVERPASS_ENDPOINTS = [
        "https://overpass-api.de/api/interpreter",
        "https://z.overpass-api.de/api/interpreter",
        "https://overpass.kumi.systems/api/interpreter"
      ];

      let currentTab = "shul";   // 'shul' | 'mikvah'
      let currentRadiusKm = 10;
      let userLat = null;
      let userLon = null;
      let lastResults = [];
      // Race-condition guard: every fetchAndRender call increments this.
      // Async callbacks check that their captured gen still matches before mutating DOM.
      let fetchGen = 0;

      // ── Init from localStorage ────────────────────────
      try {
        const savedTab = localStorage.getItem(LS_TAB_KEY);
        if (savedTab === "shul" || savedTab === "mikvah" || savedTab === "tzaddik") {
          currentTab = savedTab;
        }
        const savedRadius = parseFloat(localStorage.getItem(LS_RADIUS_KEY));
        if (savedRadius && [1,3,5,10,20,50,100].includes(savedRadius)) {
          currentRadiusKm = savedRadius;
        } else if (currentTab === "tzaddik") {
          // Tzaddikim are spread across Israel — default to a wider radius
          // for first-time visitors of this tab.
          currentRadiusKm = 20;
        }
      } catch (e) { /* ignore */ }

      // ── UI helpers ────────────────────────────────────
      function setStatus(text, showSpinner = true) {
        const area = document.getElementById("status-area");
        const txt = document.getElementById("status-text");
        area.style.display = "flex";
        area.innerHTML = "";
        if (showSpinner) {
          const sp = document.createElement("div");
          sp.className = "spinner mb-4";
          area.appendChild(sp);
        }
        const t = document.createElement("div");
        t.className = "text-slate-300/90 text-sm whitespace-pre-line";
        t.textContent = text;
        area.appendChild(t);
        document.getElementById("results").innerHTML = "";
      }

      function setError(text, withRetry = true) {
        const area = document.getElementById("status-area");
        area.style.display = "flex";
        area.innerHTML = "";
        const icon = document.createElement("div");
        icon.innerHTML = '<svg class="w-10 h-10 text-amber-300 mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>';
        area.appendChild(icon);
        const t = document.createElement("div");
        t.className = "text-slate-200 text-sm whitespace-pre-line mb-3";
        t.textContent = text;
        area.appendChild(t);
        if (withRetry) {
          const btn = document.createElement("button");
          btn.className = "btn-action primary";
          btn.textContent = "נסה שוב";
          btn.type = "button";
          btn.onclick = () => { startFlow(true); };
          area.appendChild(btn);
        }
        document.getElementById("results").innerHTML = "";
      }

      function hideStatus() {
        document.getElementById("status-area").style.display = "none";
      }

      // ── Tab switching ─────────────────────────────────
      function switchTab(tab) {
        if (tab !== "shul" && tab !== "mikvah" && tab !== "tzaddik") return;
        if (tab === currentTab && lastResults.length > 0) return;
        currentTab = tab;
        try { localStorage.setItem(LS_TAB_KEY, tab); } catch(e) {}

        const tShul = document.getElementById("tab-shul");
        const tMikvah = document.getElementById("tab-mikvah");
        const tTzaddik = document.getElementById("tab-tzaddik");
        // Reset all tab states
        for (const el of [tShul, tMikvah, tTzaddik]) {
          if (el) el.classList.remove("active", "mikvah", "tzaddik");
        }
        if (tab === "shul") {
          tShul.classList.add("active");
        } else if (tab === "mikvah") {
          tMikvah.classList.add("active", "mikvah");
        } else {
          tTzaddik.classList.add("active", "tzaddik");
        }

        const title = document.getElementById("page-title");
        const subtitle = document.getElementById("page-subtitle");
        title.classList.remove("mikvah", "tzaddik");
        if (tab === "shul") {
          title.textContent = "בתי כנסת באזורך";
          subtitle.textContent = "מצא את המקומות הקרובים אליך ונווט אליהם בלחיצה";
        } else if (tab === "mikvah") {
          title.textContent = "מקוואות באזורך";
          title.classList.add("mikvah");
          subtitle.textContent = "מקוואות קרובות אליך, ממוינות לפי מרחק";
        } else {
          title.textContent = "ציוני צדיקים באזורך";
          title.classList.add("tzaddik");
          subtitle.textContent = "ציוני צדיקים בקרבת מקום, ממוינים לפי מרחק";
        }

        if (userLat != null && userLon != null) {
          fetchAndRender();
        }
      }

      // ── Radius chips ──────────────────────────────────
      document.querySelectorAll("#radius-chips .radius-chip").forEach(chip => {
        chip.addEventListener("click", () => {
          const r = parseFloat(chip.dataset.r);
          if (!r || r === currentRadiusKm) return;
          currentRadiusKm = r;
          try { localStorage.setItem(LS_RADIUS_KEY, String(r)); } catch(e) {}
          document.querySelectorAll("#radius-chips .radius-chip").forEach(c => c.classList.remove("active"));
          chip.classList.add("active");
          if (userLat != null && userLon != null) {
            fetchAndRender();
          }
        });
        if (parseFloat(chip.dataset.r) === currentRadiusKm) {
          document.querySelectorAll("#radius-chips .radius-chip").forEach(c => c.classList.remove("active"));
          chip.classList.add("active");
        }
      });

      // Restore tab on load
      (function applyInitialTab() {
        const tShul = document.getElementById("tab-shul");
        const tMikvah = document.getElementById("tab-mikvah");
        const tTzaddik = document.getElementById("tab-tzaddik");
        for (const el of [tShul, tMikvah, tTzaddik]) {
          if (el) el.classList.remove("active", "mikvah", "tzaddik");
        }
        const title = document.getElementById("page-title");
        const subtitle = document.getElementById("page-subtitle");
        title.classList.remove("mikvah", "tzaddik");
        if (currentTab === "mikvah") {
          tMikvah.classList.add("active", "mikvah");
          title.textContent = "מקוואות באזורך";
          title.classList.add("mikvah");
          subtitle.textContent = "מקוואות קרובות אליך, ממוינות לפי מרחק";
        } else if (currentTab === "tzaddik") {
          tTzaddik.classList.add("active", "tzaddik");
          title.textContent = "ציוני צדיקים באזורך";
          title.classList.add("tzaddik");
          subtitle.textContent = "ציוני צדיקים בקרבת מקום, ממוינים לפי מרחק";
        } else {
          tShul.classList.add("active");
        }
      })();

      // ── Location handling ─────────────────────────────
      function loadCachedLocation() {
        try {
          const raw = localStorage.getItem(LS_LOC_KEY);
          if (!raw) return null;
          const obj = JSON.parse(raw);
          if (!obj || typeof obj.lat !== "number" || typeof obj.lon !== "number") return null;
          if (!obj.ts || (Date.now() - obj.ts) > LS_LOC_TTL_MS) return null;
          return obj;
        } catch(e) { return null; }
      }
      function saveLocationCache(lat, lon, address) {
        try {
          const payload = { lat, lon, ts: Date.now() };
          if (address && typeof address === "string") payload.address = address;
          localStorage.setItem(LS_LOC_KEY, JSON.stringify(payload));
          localStorage.setItem(LS_PERMISSION_KEY, "1");
        } catch(e) {}
      }

      // ── Reverse geocoding (Nominatim) ────────────────
      // Returns a string like "רחוב הקונגרס 9, פתח תקווה" or just the city name
      // when street info isn't available. Returns null on failure.
      async function reverseGeocode(lat, lon) {
        try {
          const url = "https://nominatim.openstreetmap.org/reverse"
                    + "?lat=" + encodeURIComponent(lat)
                    + "&lon=" + encodeURIComponent(lon)
                    + "&format=json&accept-language=he&addressdetails=1&zoom=18";
          const res = await fetch(url, { headers: { "Accept": "application/json" } });
          if (!res.ok) return null;
          const data = await res.json();
          if (!data || !data.address) return null;
          const a = data.address;
          const street = a.road || a.pedestrian || a.footway || a.path || "";
          const number = a.house_number || "";
          const city = a.city || a.town || a.village || a.municipality
                     || a.suburb || a.neighbourhood || a.county || "";
          const streetPart = street ? (number ? (street + " " + number) : street) : "";
          if (streetPart && city) return streetPart + ", " + city;
          if (city) return city;
          if (streetPart) return streetPart;
          if (data.display_name) {
            // Trim long display_name to first 2-3 segments
            const parts = data.display_name.split(",").map(s => s.trim()).filter(Boolean);
            return parts.slice(0, 2).join(", ");
          }
          return null;
        } catch (e) {
          return null;
        }
      }

      function requestGeolocation() {
        return new Promise((resolve, reject) => {
          if (!("geolocation" in navigator)) {
            reject(new Error("הדפדפן לא תומך באיתור מיקום."));
            return;
          }
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude });
            },
            (err) => {
              if (err.code === 1) reject(new Error("הגישה למיקום נחסמה.\nכדי להציג מקומות באזורך, אפשר גישה למיקום בדפדפן."));
              else if (err.code === 2) reject(new Error("לא ניתן לאתר את המיקום שלך כרגע. נסה שוב."));
              else if (err.code === 3) reject(new Error("פג זמן בקשת המיקום. נסה שוב."));
              else reject(new Error("שגיאה באיתור המיקום."));
            },
            { enableHighAccuracy: true, timeout: 12000, maximumAge: 1000 * 60 * 10 }
          );
        });
      }

      async function refreshLocation() {
        try {
          setStatus("מאתר מיקום…");
          const { lat, lon } = await requestGeolocation();
          userLat = lat; userLon = lon;
          // Save coords immediately so app works even if reverse geocoding fails
          saveLocationCache(lat, lon, null);
          updateLocationLabel(lat, lon, null);
          // Kick off reverse geocoding + Overpass fetch in parallel
          const rgPromise = reverseGeocode(lat, lon).then(addr => {
            if (addr) {
              updateLocationLabel(lat, lon, addr);
              saveLocationCache(lat, lon, addr);
            }
          }).catch(() => {});
          await fetchAndRender();
          // Make sure reverse-geocoding finishes (it may still be in flight)
          await rgPromise;
        } catch (e) {
          setError(e.message || "שגיאה באיתור המיקום.");
        }
      }

      function updateLocationLabel(lat, lon, address) {
        const el = document.getElementById("location-status");
        const coords = lat.toFixed(4) + ", " + lon.toFixed(4);
        if (address) {
          el.innerHTML = '<span class="text-slate-300/90">המיקום שלך:</span> '
                       + '<span class="font-bold text-white/95">' + escapeHtml(address) + '</span>'
                       + ' <span class="text-slate-400/70 text-xs">(' + coords + ')</span>';
        } else {
          el.textContent = "המיקום שלך: " + coords;
        }
      }

      // Tiny HTML-escape helper for safe insertion of address into innerHTML
      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      // ── Distance calc (haversine) ─────────────────────
      function haversineKm(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const toRad = (d) => d * Math.PI / 180;
        const dLat = toRad(lat2 - lat1);
        const dLon = toRad(lon2 - lon1);
        const a = Math.sin(dLat/2)**2 +
                  Math.cos(toRad(lat1))*Math.cos(toRad(lat2)) *
                  Math.sin(dLon/2)**2;
        return 2 * R * Math.asin(Math.sqrt(a));
      }

      function formatDistance(km) {
        if (!isFinite(km)) return "—";
        if (km < 1) return Math.round(km * 1000) + " מ'";
        if (km < 10) return km.toFixed(1) + " ק\"מ";
        return Math.round(km) + " ק\"מ";
      }

      // ── Build Overpass queries ────────────────────────
      // Returns an array of queries to run in parallel (Promise.allSettled).
      // Notes:
      //  - `nwr` = node+way+relation shortcut.
      //  - `out center;` returns id + tags + lat/lon for nodes + center for ways.
      //  - Synagogues use direct tags (fast, ~5s).
      //  - Mikvahs in Israel OSM are NOT consistently tagged with amenity=mikveh.
      //    Most are identified by their NAME containing מקווה/מקוה/Mikve. The
      //    name regex is slower (~15-25s) but it is the only reliable way to
      //    find them. We keep tag-based queries too for the few that are tagged.
      function buildQueries(type, lat, lon, radiusKm) {
        const r = Math.round(radiusKm * 1000);
        if (type === "shul") {
          return [
            `
            [out:json][timeout:30];
            (
              nwr["amenity"="place_of_worship"]["religion"="jewish"](around:${r},${lat},${lon});
              nwr["building"="synagogue"](around:${r},${lat},${lon});
            );
            out center;
            `
          ];
        } else if (type === "tzaddik") {
          // Tzaddikim (Jewish saints' graves). OSM tagging is varied:
          //  - historic=tomb is the most common — but it includes non-Jewish
          //    tombs too, so we filter client-side (parseElements).
          //  - religion=jewish with various tags catches additional ones.
          return [
            `
            [out:json][timeout:25];
            (
              nwr["historic"="tomb"](around:${r},${lat},${lon});
              nwr["historic"="memorial"]["religion"="jewish"](around:${r},${lat},${lon});
              nwr["amenity"="grave_yard"]["religion"="jewish"](around:${r},${lat},${lon});
            );
            out center;
            `,
            `
            [out:json][timeout:25];
            (
              nwr["amenity"="place_of_worship"]["religion"="jewish"]["name"~"קבר|ציון|אוהל|מערת"](around:${r},${lat},${lon});
              nwr["tourism"="attraction"]["religion"="jewish"](around:${r},${lat},${lon});
              nwr["historic"]["name"~"קבר רבי|ציון הצדיק|אוהל הרבי"](around:${r},${lat},${lon});
            );
            out center;
            `
          ];
        } else {
          return [
            // Query A: tag-prefiltered name regex (Hebrew). The KEY insight:
            // `["name"~...]` without any tag prefilter scans every named object
            // in the radius (streets, shops, etc.) and times out (504). By
            // prefixing with `["amenity"]`/`["building"]`/`["landuse"]` we cut
            // the candidate set down hugely while still catching ~all mikvahs.
            `
            [out:json][timeout:25];
            (
              nwr["amenity"]["name"~"מקווה|מקוואות|מקוה"](around:${r},${lat},${lon});
              nwr["amenity"]["name:he"~"מקווה|מקוואות|מקוה"](around:${r},${lat},${lon});
              nwr["building"]["name"~"מקווה|מקוואות|מקוה"](around:${r},${lat},${lon});
              nwr["building"]["name:he"~"מקווה|מקוואות|מקוה"](around:${r},${lat},${lon});
              nwr["landuse"]["name"~"מקווה|מקוואות|מקוה"](around:${r},${lat},${lon});
              nwr["landuse"]["name:he"~"מקווה|מקוואות|מקוה"](around:${r},${lat},${lon});
            );
            out center;
            `,
            // Query B: explicit amenity/building tags + English-language names
            // (also tag-prefiltered). Catches the few properly-tagged ones and
            // English mikvahs.
            `
            [out:json][timeout:25];
            (
              nwr["amenity"="mikveh"](around:${r},${lat},${lon});
              nwr["amenity"="mikvah"](around:${r},${lat},${lon});
              nwr["amenity"="ritual_bath"](around:${r},${lat},${lon});
              nwr["amenity"="public_bath"]["religion"="jewish"](around:${r},${lat},${lon});
              nwr["building"="mikveh"](around:${r},${lat},${lon});
              nwr["building"="mikvah"](around:${r},${lat},${lon});
              nwr["leisure"="mikveh"](around:${r},${lat},${lon});
              nwr["amenity"]["name"~"Mikve|Mikvah|Mikveh|Mikvaot",i](around:${r},${lat},${lon});
              nwr["building"]["name"~"Mikve|Mikvah|Mikveh|Mikvaot",i](around:${r},${lat},${lon});
            );
            out center;
            `
          ];
        }
      }

      // ── Overpass fetch with parallel endpoint race ────
      // We fire the query at ALL endpoints simultaneously and resolve with
      // whichever one returns valid JSON first. This is the most robust
      // approach against 504/overload from individual servers — if one mirror
      // is slow or down, the others can still deliver a fast response.
      // Each endpoint has a 35s client-side AbortController timeout.
      async function overpassFetch(query) {
        const fetchOne = (endpoint) => {
          return new Promise((resolve, reject) => {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 35000);
            fetch(endpoint, {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body: "data=" + encodeURIComponent(query),
              signal: controller.signal
            }).then(res => {
              clearTimeout(timer);
              if (!res.ok) {
                reject(new Error("HTTP " + res.status + " from " + endpoint));
                return;
              }
              return res.text().then(text => {
                if (!text || text.trim()[0] !== "{") {
                  reject(new Error("Non-JSON response from " + endpoint));
                  return;
                }
                try {
                  resolve(JSON.parse(text));
                } catch (e) {
                  reject(new Error("Parse error from " + endpoint));
                }
              });
            }).catch(e => {
              clearTimeout(timer);
              reject(new Error((e && e.message ? e.message : "fetch failed") + " (" + endpoint + ")"));
            });
          });
        };

        const promises = OVERPASS_ENDPOINTS.map(fetchOne);
        try {
          // Promise.any returns the first FULFILLED promise (ignores rejections
          // until all fail). Native in modern browsers (2021+).
          return await Promise.any(promises);
        } catch (aggregateErr) {
          // All endpoints failed — collect error messages for diagnostics
          const errs = (aggregateErr && aggregateErr.errors)
            ? aggregateErr.errors.map(e => e.message || String(e))
            : ["all endpoints failed"];
          throw new Error(errs.join(" | "));
        }
      }

      // ── Parse Overpass elements ───────────────────────
      // `tab` argument is captured at fetch start so we use the correct
      // default name even if the user switched tabs while we were loading.
      // For tzaddik tab, we also apply a CLIENT-SIDE filter to keep only Jewish
      // entries — OSM's historic=tomb tag includes non-Jewish tombs as well.
      function isJewishTzaddikItem(tags, name) {
        if (!name) return false;

        // ── HARD EXCLUDES ──
        // Sheikh detection (catches "שיח'", "שיח׳", "השיח'", "שיח עלי", etc.).
        // We treat "שיח" as a sheikh marker whenever it is NOT followed by another
        // Hebrew letter (which would mean it is part of a different Hebrew word
        // like "שיחה" / "שיחות" — conversation).
        if (/שיח(?![א-ת])/.test(name)) return false;
        if (/شيخ|Sheikh|Sheik/i.test(name)) return false;
        // Non-Hebrew scripts (Arabic, Coptic, Greek beyond basic)
        if (/[؀-ۿ܀-ݏͰ-ϿⲀ-⳿]/.test(name)) return false;
        // Generic cemetery sections / unnamed burial caves — NOT specific tzaddikim
        if (/^\s*מערת קבורה\s*$/.test(name)) return false;
        if (/^\s*בית\s+(עלמין|קברות)/.test(name)) return false;
        if (/חלקת\s+(מעפילי|נופלים|חללי|חיילים|מחתרת|שואה)/.test(name)) return false;
        // Known non-tzaddik historical/ancient tombs (Hellenistic/Second Temple
        // archaeological sites that aren't visited as tzaddik graves).
        if (/יאסון|ניקנור|בני\s+חזיר|חלקת\s+הר/.test(name)) return false;
        // Non-Jewish historical figures
        if (/Schindler|מעפילי\s+אגוז|מעפילי\s+סלבדור/.test(name)) return false;
        // Explicit non-Jewish religion tag → drop
        if (tags["religion"] && tags["religion"] !== "jewish") return false;

        // ── EXPLICIT INCLUDES (strong signals) ──
        // Rabbinic titles — these clearly indicate a tzaddik / religious figure.
        // Note: JavaScript's \b uses ASCII \w only, so we can't use \b for Hebrew
        // word boundaries. We use a lookahead asserting "non-Hebrew or end of string"
        // as the right-side boundary instead.
        if (/(^|\s)(רבי|הרב|רב|האדמו|האדמור|הצדיק|הבעש|הבעל\s+שם|מהר|מהרי|מהרל|מהרש|רבן|הגאון|הגרי|הגר|הרי|רשבי|הריצ)(?=\s|$|[^א-ת])/.test(name)) return true;
        // Abbreviated rabbinic titles: "ר'" / "ר׳" / "ר " followed by a Hebrew name.
        if (/(^|\s)ר['׳"]\s*[א-ת]/.test(name)) return true;
        if (/(^|\s)ר\s+[א-ת]{2,}/.test(name)) return true;
        if (/(^|\s)(האר["׳']?י|הרמב["׳']?ם|הרמב["׳']?ן|הרמ["׳']?א|הרשב["׳']?א|הריב["׳']?ש|הנודע\s+ביהודה)(?=\s|$|[^א-ת])/.test(name)) return true;
        // Famous biblical / talmudic / chassidic tombs (explicit list)
        if (/קבר\s+רחל|מערת\s+המכפלה|מערת\s+הנביאים|קבר\s+יוסף|קבר\s+דוד(\s|$)|קבר\s+שמואל|קבר\s+חולדה|קבר\s+בנימין|קבר\s+אבשלום|קבר\s+זכריה|קבר\s+חבקוק|קבר\s+עזרא|קבר\s+חוני|קבר\s+שמעון\s+הצדיק|קבר\s+יהושע|קבר\s+כלב|קבר\s+נחום|קבר\s+יונה|קבר\s+מלאכי|קבר\s+אסתר|קבר\s+מרדכי|קבר\s+יחזקאל|קבר\s+דניאל/.test(name)) return true;
        // "ציון [tzaddik]" / "אוהל [tzaddik]" — religious markers
        if (/ציון\s+(רבי|הרב|הצדיק|האדמו|הבעש|מהר|הרמב|הרשב|הריב|בעל)/.test(name)) return true;
        if (/אוהל\s+(רבי|הרב|הצדיק|האדמו|הבעש|בעל)/.test(name)) return true;
        // Specific famous tzaddikim by name (chassidic / mussar / etc.)
        if (/(הבעל\s+שם\s+טוב|הבעש["׳']?ט|רבי\s+שמעון\s+בר\s+יוחאי|רבי\s+נחמן|רבי\s+מאיר\s+בעל\s+הנס|רבי\s+עקיבא|רבי\s+ישראל|רבי\s+יהודה|הרב\s+קוק|חיים\s+בן\s+עטר|מנדבורנה|חתם\s+סופר|חזון\s+איש|חפץ\s+חיים|ה?ב?אבא\s+סאלי|בעל\s+הסולם|אור\s+החיים)/.test(name)) return true;
        // Famous tombs not always prefixed with "קבר"
        if (/(^|\s)(קבר\s+ה?אימהות|ה?אימהות|ה?אבות|יד\s+אבשלום)(?=\s|$|[^א-ת])/.test(name)) return true;
        // Bare biblical-figure names (Patriarchs, Matriarchs, key prophets/leaders).
        // Must be a full standalone reference, not part of a longer phrase like "אברהם הירדני".
        if (/^(אברהם\s+אבינו|יצחק\s+אבינו|יעקב\s+אבינו|שרה\s+אמנו|רבקה\s+אמנו|לאה\s+אמנו|רחל\s+אמנו|יהושע\s+בן\s+נון)$/.test(name.trim())) return true;
        // English-language entries with explicit Jewish-religious markers.
        // Matches "Rabbi X", "Rabbenu X", "Cave of Rabbi X", "Tomb of Rabbi X", "HaRav X".
        if (/\b(Rabbi|Rabbenu|HaRav|Ha-Rav|the Tzadik|tzadik\b)/i.test(name)) {
          // But still drop if it's a non-Jewish context that happens to contain "Rabbi"
          if (!/Sheikh|Muslim|Christian|Mosque|Church/i.test(name)) return true;
        }

        // Default: reject. User explicitly wants only known tzaddikim, no random graves.
        return false;
      }

      function parseElements(elements, userLat, userLon, tab) {
        const seen = new Set();
        const list = [];
        const t = tab || currentTab;
        const defaultName = (t === "shul") ? "בית כנסת"
                          : (t === "mikvah") ? "מקווה"
                          : "ציון צדיק";
        for (const el of elements) {
          let lat = el.lat, lon = el.lon;
          if (lat == null && el.center) { lat = el.center.lat; lon = el.center.lon; }
          if (lat == null || lon == null) continue;
          const tags = el.tags || {};
          const name = tags["name:he"] || tags["name"] || tags["name:en"]
                    || tags["alt_name"] || tags["alt_name:he"] || tags["short_name"]
                    || tags["loc_name"] || tags["official_name"] || tags["operator"]
                    || tags["description"] || defaultName;
          // Tzaddik tab: filter to Jewish-only items, and skip unnamed
          if (t === "tzaddik") {
            if (name === defaultName) continue; // skip unnamed (user wanted named only)
            if (!isJewishTzaddikItem(tags, name)) continue;
          }
          // Build a simple address line
          const addrParts = [];
          if (tags["addr:street"]) {
            let s = tags["addr:street"];
            if (tags["addr:housenumber"]) s += " " + tags["addr:housenumber"];
            addrParts.push(s);
          }
          if (tags["addr:city"]) addrParts.push(tags["addr:city"]);
          const address = addrParts.join(", ");

          const key = name + "|" + lat.toFixed(5) + "|" + lon.toFixed(5);
          if (seen.has(key)) continue;
          seen.add(key);
          const dist = haversineKm(userLat, userLon, lat, lon);
          list.push({ name, address, lat, lon, distanceKm: dist });
        }
        list.sort((a, b) => a.distanceKm - b.distanceKm);
        return list;
      }

      // ── Render results ────────────────────────────────
      function renderResults(items, tab) {
        const t = tab || currentTab;
        const out = document.getElementById("results");
        out.innerHTML = "";
        const noun = t === "shul" ? "בתי כנסת"
                  : t === "mikvah" ? "מקוואות"
                  : "ציוני צדיקים";
        if (!items || items.length === 0) {
          setStatus(
            "לא נמצאו " + noun + " ברדיוס " + currentRadiusKm + " ק\"מ.\nנסה להרחיב את רדיוס החיפוש.",
            false
          );
          return;
        }
        hideStatus();

        const header = document.createElement("div");
        header.className = "text-slate-300/80 text-sm mb-2 px-1";
        header.textContent = "נמצאו " + items.length + " " + noun +
                             " ברדיוס " + currentRadiusKm + " ק\"מ";
        out.appendChild(header);

        items.forEach((it, idx) => {
          const card = document.createElement("div");
          card.className = "card p-4 flex items-center justify-between gap-3 fade-in";
          card.style.animationDelay = Math.min(idx * 35, 600) + "ms";

          const left = document.createElement("div");
          left.className = "flex-1 min-w-0";
          const nameEl = document.createElement("div");
          nameEl.className = "item-name";
          nameEl.textContent = it.name;
          left.appendChild(nameEl);
          if (it.address) {
            const ad = document.createElement("div");
            ad.className = "item-address";
            ad.textContent = it.address;
            left.appendChild(ad);
          }
          const dist = document.createElement("div");
          dist.className = "item-distance";
          dist.textContent = "מרחק: " + formatDistance(it.distanceKm);
          left.appendChild(dist);

          const right = document.createElement("div");
          right.className = "flex-shrink-0";
          const navBtn = document.createElement("button");
          navBtn.className = "nav-btn";
          navBtn.type = "button";
          navBtn.setAttribute("aria-label", "נווט אל " + it.name);
          navBtn.innerHTML =
            '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">' +
            '<polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>' +
            '</svg><span>לניווט</span>';
          navBtn.onclick = () => openInWaze(it.lat, it.lon);
          right.appendChild(navBtn);

          card.appendChild(left);
          card.appendChild(right);
          out.appendChild(card);
        });
      }// ── Open in Waze ──────────────────────────────────
      function openInWaze(lat, lon) {
        const url = "https://waze.com/ul?ll=" + encodeURIComponent(lat + "," + lon) + "&navigate=yes";
        // Open in new tab so the user's session here is preserved
        window.open(url, "_blank", "noopener");
      }

      // ── Small UI helpers for streaming/instant-cache mode ──
      // A live "מעדכן…" indicator at the top of the results list, with a tiny spinner.
      function showRefreshHint(text) {
        const out = document.getElementById("results");
        if (!out) return;
        const ex = out.querySelector(".refresh-hint");
        if (ex) ex.remove();
        if (!text) return;
        const hint = document.createElement("div");
        hint.className = "refresh-hint flex items-center justify-center gap-2 mb-2 py-1.5 text-cyan-200/90 text-xs";
        const sp = document.createElement("div");
        sp.className = "spinner-small";
        sp.setAttribute("aria-hidden", "true");
        const label = document.createElement("span");
        label.textContent = text;
        hint.appendChild(sp);
        hint.appendChild(label);
        out.insertBefore(hint, out.firstChild);
      }
      // A persistent amber notice shown when all servers fail but we have stale cache.
      function showStaleNotice(text) {
        const out = document.getElementById("results");
        if (!out) return;
        const ex = out.querySelector(".stale-notice");
        if (ex) ex.remove();
        if (!text) return;
        const n = document.createElement("div");
        n.className = "stale-notice text-amber-300/90 text-xs mb-2 px-1 text-center";
        n.textContent = text;
        out.insertBefore(n, out.firstChild);
      }

      // ── Main fetch & render flow (streaming + instant cache) ──
      // Behaviour:
      //  1. INSTANT CACHE: If we have a recent successful result in localStorage,
      //     render it immediately so the user sees data in ~0ms.
      //  2. STREAMING: Fire all queries in parallel; as each one resolves, merge
      //     and re-render. This shows the first batch of fresh results as soon
      //     as they are available, without waiting for every query to finish.
      //  3. RACE-SAFE: fetchGen prevents stale fetches from overwriting fresh ones.
      //  4. CACHE-ON-FAILURE: If all queries fail and we displayed cache, keep
      //     showing cache + an amber stale notice. Otherwise show a clear error.
      async function fetchAndRender() {
        if (userLat == null || userLon == null) return;
        const myGen = ++fetchGen;
        const tab = currentTab; // snapshot for use throughout this run

        // 1. INSTANT CACHE
        const cachedResults = loadCachedResults(tab, currentRadiusKm, userLat, userLon);
        let hasCacheShown = false;
        if (cachedResults && cachedResults.length > 0) {
          if (myGen !== fetchGen) return;
          lastResults = cachedResults;
          renderResults(cachedResults, tab);
          showRefreshHint("מעדכן נתונים…");
          hasCacheShown = true;
        } else {
          const noun = tab === "shul" ? "בתי כנסת"
                    : tab === "mikvah" ? "מקוואות"
                    : "ציוני צדיקים";
          const statusMsg = tab === "shul"
            ? "מחפש " + noun + " ברדיוס " + currentRadiusKm + " ק\"מ…"
            : "מחפש " + noun + " ברדיוס " + currentRadiusKm + " ק\"מ…\nהחיפוש עשוי להימשך עד 30 שניות.";
          setStatus(statusMsg);
        }

        // 2. STREAMING
        const queries = buildQueries(tab, userLat, userLon, currentRadiusKm);
        const seenIds = new Set();
        const allElements = [];
        let succeededCount = 0;
        let pendingCount = queries.length;
        let lastError = null;

        const handleOne = async (q) => {
          try {
            const data = await overpassFetch(q);
            if (myGen !== fetchGen) return;
            succeededCount++;
            pendingCount--;
            // Merge new elements, dedup by type+id
            const newElems = (data && Array.isArray(data.elements)) ? data.elements : [];
            for (const el of newElems) {
              const key = (el.type || "") + ":" + (el.id || "");
              if (!seenIds.has(key)) {
                seenIds.add(key);
                allElements.push(el);
              }
            }
            // Re-render whenever we have items (replaces cache/previous batch)
            if (allElements.length > 0) {
              const items = parseElements(allElements, userLat, userLon, tab);
              const filtered = items.filter(it => it.distanceKm <= currentRadiusKm + 0.05);
              if (myGen !== fetchGen) return;
              lastResults = filtered;
              renderResults(filtered, tab);
              if (pendingCount > 0) {
                showRefreshHint("מחפש עוד תוצאות…");
              }
            }
          } catch (err) {
            lastError = err;
            pendingCount--;
          }
        };

        // Promise.all is safe here because handleOne never throws (try/catch inside).
        await Promise.all(queries.map(handleOne));
        if (myGen !== fetchGen) return;

        // 3. POST-PROCESSING
        showRefreshHint(null); // remove the live "updating" indicator

        if (succeededCount > 0) {
          // At least one query succeeded.
          if (allElements.length > 0) {
            // Fresh results shown via streaming — persist them for next visit.
            saveCachedResults(tab, currentRadiusKm, userLat, userLon, lastResults);
          } else {
            // Queries OK but genuinely empty (e.g., too-small radius).
            lastResults = [];
            saveCachedResults(tab, currentRadiusKm, userLat, userLon, []);
            const nNoun = tab === "shul" ? "בתי כנסת"
                        : tab === "mikvah" ? "מקוואות"
                        : "ציוני צדיקים";
            setStatus(
              "לא נמצאו " + nNoun + " ברדיוס " + currentRadiusKm + " ק\"מ.\nנסה להרחיב את רדיוס החיפוש.",
              false
            );
          }
        } else {
          // All queries failed.
          if (hasCacheShown) {
            // Keep the cache displayed, add a "stale" amber notice.
            showStaleNotice("⚠ השרתים עמוסים. מציג תוצאות מהחיפוש הקודם.");
          } else {
            // Last-ditch: try ANY cache we have for this tab (any radius/location)
            const anyCache = loadAnyCacheForTab(tab);
            if (anyCache && anyCache.length > 0) {
              lastResults = anyCache;
              renderResults(anyCache, tab);
              showStaleNotice("⚠ כל שרתי OpenStreetMap עמוסים כרגע. מציג את התוצאות האחרונות שנשמרו במכשיר.");
              return;
            }
            // No cache at all — show a helpful error.
            const errMsg = lastError && lastError.message ? lastError.message : "כל השרתים לא הגיבו בזמן";
            setError(
              "שגיאה בטעינת נתונים מ-OpenStreetMap.\n"
              + "השרתים עמוסים כרגע. נסה רדיוס קטן יותר, או נסה שוב בעוד דקה.\n\n"
              + "(" + errMsg + ")"
            );
          }
        }
      }

      // ── Results cache (used as fallback when all servers are down) ──
      function _cacheKey(tab, radius, lat, lon) {
        // Round coords to ~1km precision so nearby fetches share a cache slot
        return "shulMikveCache_" + tab + "_r" + radius + "_" + lat.toFixed(2) + "_" + lon.toFixed(2);
      }
      function loadCachedResults(tab, radius, lat, lon) {
        try {
          const raw = localStorage.getItem(_cacheKey(tab, radius, lat, lon));
          if (!raw) return null;
          const obj = JSON.parse(raw);
          if (!obj || !Array.isArray(obj.items)) return null;
          if (!obj.ts || (Date.now() - obj.ts) > 1000 * 60 * 60 * 24 * 30) return null;
          let items = obj.items;
          // Re-apply current filter for tzaddik tab — older cached data might
          // contain entries that no longer pass the (now stricter) name filter.
          if (tab === "tzaddik") {
            items = items.filter(it => isJewishTzaddikItem({}, it.name));
          }
          return items.map(it => ({
            name: it.name, address: it.address, lat: it.lat, lon: it.lon,
            distanceKm: haversineKm(lat, lon, it.lat, it.lon)
          })).sort((a, b) => a.distanceKm - b.distanceKm);
        } catch (e) { return null; }
      }
      function saveCachedResults(tab, radius, lat, lon, items) {
        try {
          const slim = items.map(it => ({ name: it.name, address: it.address, lat: it.lat, lon: it.lon }));
          localStorage.setItem(_cacheKey(tab, radius, lat, lon), JSON.stringify({ ts: Date.now(), items: slim }));
        } catch (e) { /* ignore */ }
      }
      // Last-ditch fallback: find ANY cached entry for this tab (any radius,
      // any location) when all Overpass servers are down. Returns the newest
      // non-empty cache, sorted by distance from the user's CURRENT location.
      function loadAnyCacheForTab(tab) {
        try {
          const prefix = "shulMikveCache_" + tab + "_";
          let best = null;
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (!k || !k.startsWith(prefix)) continue;
            const raw = localStorage.getItem(k);
            if (!raw) continue;
            try {
              const obj = JSON.parse(raw);
              if (obj && Array.isArray(obj.items) && obj.items.length > 0) {
                if (!best || (obj.ts || 0) > (best.ts || 0)) best = obj;
              }
            } catch (e) {}
          }
          if (!best) return null;
          if (userLat == null || userLon == null) return null;
          let items = best.items;
          // Re-apply current filter for tzaddik tab (see loadCachedResults).
          if (tab === "tzaddik") {
            items = items.filter(it => isJewishTzaddikItem({}, it.name));
          }
          return items.map(it => ({
            name: it.name, address: it.address, lat: it.lat, lon: it.lon,
            distanceKm: haversineKm(userLat, userLon, it.lat, it.lon)
          })).sort((a, b) => a.distanceKm - b.distanceKm);
        } catch (e) { return null; }
      }

      // ── Startup flow ──────────────────────────────────
      async function startFlow(forceFresh = false) {
        const cached = !forceFresh ? loadCachedLocation() : null;
        if (cached) {
          userLat = cached.lat;
          userLon = cached.lon;
          updateLocationLabel(cached.lat, cached.lon, cached.address || null);
          if (!cached.address) {
            reverseGeocode(cached.lat, cached.lon).then(addr => {
              if (addr) {
                updateLocationLabel(cached.lat, cached.lon, addr);
                saveLocationCache(cached.lat, cached.lon, addr);
              }
            }).catch(() => {});
          }
          await fetchAndRender();
          return;
        }
        await refreshLocation();
      }
      window.addEventListener("load", () => {
        startFlow(false);
      });
    </script>
  </body>
</html>
